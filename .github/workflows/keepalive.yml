name: Keep Scheduled Workflows Active

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-monitor-repository
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update monthly heartbeat
        shell: bash
        run: |
          date -u +%Y-%m > .github/heartbeat

          if git diff --quiet -- .github/heartbeat; then
            echo "Heartbeat is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/heartbeat
          git commit -m "chore: keep scheduled workflow active [skip ci]"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
